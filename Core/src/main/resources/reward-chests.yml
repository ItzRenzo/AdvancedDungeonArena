# ============================================================
#  Reward Chest Config  —  reward-chests.yml
# ============================================================

# Rarity weight tables per difficulty tier.
#
# Each chest rolls one rarity independently using the weights
# of the difficulty assigned to that dungeon.
#
# Higher weight = more likely. Values are relative — they do
# not need to sum to 100.
#
#   Example (hard):  common=15, rare=40, legendary=45  → total 100
#     COMMON     15/100 = 15%
#     RARE       40/100 = 40%
#     LEGENDARY  45/100 = 45%

weights:

  easy:
    common:    75
    rare:      22
    legendary:  3

  medium:
    common:    50
    rare:      38
    legendary: 12

  hard:
    common:    30
    rare:      45
    legendary: 25
# ---------------------------------------------------------------
# Assign dungeons to a difficulty tier.
# Dungeon IDs are case-insensitive.
# Any dungeon not listed here defaults to: medium
# ---------------------------------------------------------------

difficulty:

  easy:
    - sample
    - sample2

  medium:
    - dungeon3
    - dungeon4

  hard:
    - dungeon5
    - dungeon6
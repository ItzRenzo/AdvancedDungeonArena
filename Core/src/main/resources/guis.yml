      - 19,20,21,22,23,24,25
      - 28,29,30,31,32,33,34

    leader: 4
    leave: 40

  leader:
    name: "&6👑 %leader%"
    lore:
      - "&eParty Leader"
      - "&7Has full control over the party"
      - ""
      - "&7Members: &f%members%"

  member:
    name: "&f%member%"
